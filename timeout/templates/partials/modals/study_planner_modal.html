<div class="modal fade" id="studyPlannerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Plan Study Sessions</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">

        <div id="sp-step-1">
          <p class="text-muted small mb-3">Pick a deadline, enter how many hours you need, and AI will find free slots in your calendar.</p>
          <div class="mb-3">
            <label for="spDeadline" class="form-label">Deadline / Exam</label>
            <select class="form-select" id="spDeadline">
              {% for event in upcoming_deadlines %}
                <option value="{{ event.id }}">{{ event.title }} — {{ event.start_datetime|date:"D, d M H:i" }}</option>
              {% empty %}
                <option disabled selected>No upcoming deadlines or exams</option>
              {% endfor %}
            </select>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label for="spHours" class="form-label">Total hours needed</label>
              <input type="number" class="form-control" id="spHours" value="4" min="1" max="40" step="0.5">
            </div>
            <div class="col-6">
              <label for="spSessionLen" class="form-label">Session length (hrs)</label>
              <input type="number" class="form-control" id="spSessionLen" value="2" min="0.5" max="8" step="0.5">
            </div>
          </div>
          <div id="spError" class="alert alert-danger mt-3 d-none"></div>
        </div>

        <div id="sp-step-2" class="d-none">
          <p class="text-muted small mb-2">Here's your plan, confirm to add to calendar.</p>
          <div id="spPreview"></div>
        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-nep text-white" id="spPlanBtn" onclick="submitPlan()">Plan with AI</button>
        <button type="button" class="btn btn-light d-none" id="backBtn" onclick="showStep1()">Back</button>
        <button type="button" class="btn btn-nep text-white d-none" id="confirmBtn">Create Sessions</button>
      </div>
    </div>
  </div>
</div>
