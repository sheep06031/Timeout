{% extends "base.html" %}
{% load static %}

{% block title %}Edit Note — Timeout{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/notes.css' %}">
{% endblock %}

{% block content %}
<div class="notes-page">
  <div class="notes-card">

    <div class="notes-toolbar">
      <h1 class="notes-title">Edit Note</h1>
      <a href="{% url 'notes' %}" class="note-btn">&#8592; Back</a>
    </div>

    <div class="p-4">
      <form method="post" action="{% url 'note_edit' note.id %}">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_title" class="form-label">Title</label>
          {{ form.title }}
        </div>
        <div class="mb-3">
          <label for="id_content" class="form-label">Content</label>
          {{ form.content }}
        </div>
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label for="id_category" class="form-label">Category</label>
            {{ form.category }}
          </div>
          <div class="col-md-6">
            <label for="id_event" class="form-label">Link to Event</label>
            {{ form.event }}
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn submit-btn">Save Changes</button>
          <a href="{% url 'notes' %}" class="btn btn-light">Cancel</a>
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}
