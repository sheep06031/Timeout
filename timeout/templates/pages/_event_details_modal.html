{% load static %}
<link rel="stylesheet" href="{% static 'css/event_details.css' %}">

<!-- Event Details Modal -->
<div class="modal fade" id="eventDetailsModal" tabindex="-1" aria-labelledby="eventDetailsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content event-modal-content">
      <div class="event-modal-bar" id="eventModalBar"></div>

      <!-- Header -->
      <div class="event-modal-header">
        <div class="event-modal-badges">
          <span class="event-modal-badge" id="eventBadge"></span>
          <span class="event-modal-badge event-modal-badge--visibility" id="eventVisibilityBadge"></span>
          <span class="event-modal-badge event-modal-badge--status" id="eventStatusBadge"></span>
        </div>
        <div class="event-modal-title-row">
          <h4 class="event-modal-title" id="eventDetailsModalLabel"></h4>
        </div>
        <div class="event-modal-time" id="eventTime"></div>
      </div>

      <!-- Body -->
      <div class="event-modal-body">

        <!-- Event details -->
        <div class="event-modal-grid">
          <div class="event-modal-cell">
            <span class="event-modal-cell-label">📍 Location</span>
            <span class="event-modal-cell-value" id="eventLocation">—</span>
          </div>
          <div class="event-modal-cell">
            <span class="event-modal-cell-label">🔁 Recurrence</span>
            <span class="event-modal-cell-value" id="eventRecurrence">—</span>
          </div>
          <div class="event-modal-cell">
            <span class="event-modal-cell-label">⏱ Duration</span>
            <span class="event-modal-cell-value" id="eventDuration">—</span>
          </div>
          <div class="event-modal-cell">
            <span class="event-modal-cell-label">⏳ Time</span>
            <span class="event-modal-cell-value" id="eventCountdown">—</span>
          </div>
        </div>

        <!-- Description -->
        <div class="event-modal-description" id="eventDescriptionWrap" style="display:none;">
          <span class="event-modal-cell-label">📝 Description</span>
          <p class="event-modal-desc-text" id="eventDescription"></p>
        </div>

      </div>

      <!-- Footer -->
      <div class="event-modal-footer">
        <a href="#" id="editEventBtn" class="event-modal-btn event-modal-btn--primary">
          ✏️ Edit
        </a>
        <a href="#" id="deleteEventBtn"
           onclick="return confirm('Are you sure you want to delete this event?');"
           class="event-modal-btn event-modal-btn--danger">
          🗑 Delete
        </a>
        <button type="button" data-bs-dismiss="modal" class="event-modal-btn event-modal-btn--ghost">
          Close
        </button>
      </div>

    </div>
  </div>
</div>

<script 
  src="{% static 'js/event_details.js' %}">
</script>
